apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbox-mcp
  namespace: default
  labels:
    app: netbox-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbox-mcp
  template:
    metadata:
      labels:
        app: netbox-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netbox-mcp
          # Replace with your registry and tag, e.g. ghcr.io/yourorg/netbox-mcp:v1.0.0
          image: netbox-mcp:latest
          imagePullPolicy: IfNotPresent
          args: ["--listen", ":8080"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NETBOX_URL
              valueFrom:
                configMapKeyRef:
                  name: netbox-mcp
                  key: NETBOX_URL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
