apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbox-mcp.fullname" . }}
  labels:
    {{- include "netbox-mcp.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "netbox-mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
