{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "netbox-mcp.fullname" . }}
  labels:
    {{- include "netbox-mcp.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "netbox-mcp.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /healthz
      interval: {{ .Values.serviceMonitor.interval }}
      scheme: http
{{- end }}
