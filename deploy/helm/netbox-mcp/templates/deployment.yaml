apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbox-mcp.fullname" . }}
  labels:
    {{- include "netbox-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbox-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netbox-mcp.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "netbox-mcp.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--listen", ":8080"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NETBOX_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "netbox-mcp.fullname" . }}
                  key: NETBOX_URL
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
